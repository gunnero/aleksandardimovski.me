version: 2
updates:
  - package-ecosystem: composer
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Skopje
    open-pull-requests-limit: 3
    groups:
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Skopje
    open-pull-requests-limit: 3
    groups:
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
